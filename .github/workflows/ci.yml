name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - madhava/port

jobs:
  rust-tests:
    name: Rust tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy -p bcftools-rs -p bcftools-rs-cli --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test -p bcftools-rs -p bcftools-rs-cli

  perl-parity-tests:
    name: bcftools Perl parity tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.89.0

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build Rust bcftools
        run: cargo build --release -p bcftools-rs-cli

      - name: test.pl enabled parity slices
        run: scripts/run-bcftools-test-pl.sh -f '^(test_vcf_head|test_index|test_vcf_idxstats)$'
